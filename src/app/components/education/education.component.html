<section class="education section-shell fade-in">
  <div class="education-container glass-card">
    <h2 class="section-title">Education</h2>
    <p class="section-subtitle">Academic foundation in computer science, algorithms, AI, and systems engineering.</p>

    <div class="timeline">
      <article
        *ngFor="let edu of education; let i = index"
        class="timeline-item"
        [ngClass]="{ left: i % 2 === 0, right: i % 2 !== 0 }"
      >
        <div class="timeline-icon" [ngStyle]="{ 'background-color': edu.color }">
          <mat-icon>school</mat-icon>
        </div>

        <div class="timeline-content">
          <h3>{{ edu.degree }}</h3>
          <p class="institution">{{ edu.institution }} · {{ edu.year }}</p>
          <p>{{ edu.description }}</p>
        </div>
      </article>
    </div>
  </div>
</section>
